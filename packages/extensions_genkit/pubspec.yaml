name: extensions_genkit
version: 0.1.0
description: >-
  Genkit adapter for the extensions AI abstractions. Plug Genkit models into
  the ChatClient pipeline — including logging, caching, and function-invocation
  middleware — without modifying the core packages.
repository: https://www.github.com/jamiewest/extensions
issue_tracker: https://github.com/jamiewest/extensions/issues

environment:
  sdk: '>=3.6.0 <4.0.0'
resolution: workspace

topics:
  - ai
  - genkit
  - llm

dependencies:
  extensions: ^0.3.26
  genkit: ^0.13.0

dev_dependencies:
  test: ^1.24.0
  lints: ^6.0.0
